<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lounge - Kassa PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0b0612; color: #e0d5f0; padding: 20px; }
        h1, h2 { color: #bc95f9; text-shadow: 0 0 10px #bc95f9; text-align: center; margin-bottom: 20px; }
        
        .staff-bar { background: #130b21; border: 1px solid #3d2461; padding: 15px; border-radius: 8px; display: flex; gap: 10px; align-items: center; justify-content: center; margin-bottom: 20px; }
        .staff-bar select, .staff-bar button { width: auto; margin: 0; }

        .main-container { display: flex; flex-wrap: wrap; gap: 20px; }
        .tables-section { flex: 1.5; background: #130b21; border: 1px solid #3d2461; padding: 20px; border-radius: 8px; }
        .order-section { flex: 1; background: #130b21; border: 1px solid #3d2461; padding: 20px; border-radius: 8px; display: none; }
        
        .tables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .table-card { padding: 20px 10px; border-radius: 6px; text-align: center; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .empty { background: #1b4d22; border: 1px solid #2ecc71; color: #2ecc71; }
        .busy { background: #661c1c; border: 1px solid #e74c3c; color: #e74c3c; }
        
        /* Yenilənmiş Menyu Grid Sistemi */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; max-height: 280px; overflow-y: auto; padding: 10px; background: #0b0612; border: 1px solid #3d2461; margin-top: 10px; }
        .menu-card { background: #1c1032; border: 1px solid #5c3893; border-radius: 8px; overflow: hidden; text-align: center; cursor: pointer; padding-bottom: 8px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 160px; transition: 0.2s; }
        .menu-card:hover { transform: translateY(-3px); box-shadow: 0 0 10px #bc95f9; }
        
        /* Şəkillərin Tam Oturması və Qırılmaması Üçün Çərçivə */
        .img-container { width: 100%; height: 90px; background: #22143b; display: flex; align-items: center; justify-content: center; overflow: hidden; border-bottom: 1px solid #5c3893; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .menu-card span { font-size: 12px; font-weight: bold; padding: 2px 5px; word-break: break-all; }

        button, select { background: #6f3bbb; color: #fff; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; margin: 5px 0; }
        button:hover { background: #8a4fff; }
        .order-item { background: #1c122e; padding: 8px; margin: 4px 0; display: flex; justify-content: space-between; font-size: 13px; border: 1px solid #3d2461; }
    </style>
</head>
<body>

    <h1>☕ LOUNGE TERMINAL PRO</h1>

    <div class="staff-bar">
        <label>👤 İşçi Növbəsi:</label>
        <select id="staffSelect"><option value="">İşçi Seçin...</option></select>
        <button onclick="staffLog('Giriş Etdi')">▶ GİRİŞ</button>
        <button onclick="staffLog('Çıxış Etdi')" style="background:#c0392b;">❌ ÇIXIŞ</button>
        <button onclick="finishDayWork()" style="background:#d35400; margin-left:auto;">🏁 GÜNÜ TAMAMLA</button>
    </div>

    <div class="main-container">
        <div class="tables-section">
            <h2>🪑 Masalar</h2>
            <div id="tablesGrid" class="tables-grid">Yüklənir...</div>
        </div>

        <div id="orderSection" class="order-section">
            <h2 id="selectedTableName">[ Masa ]</h2>
            <div style="font-size: 22px; text-align: center; color: #2ecc71; margin: 10px 0;">Cəmi: <span id="tableTotal">0.00</span> AZN</div>
            
            <div id="currentOrders" style="max-height: 150px; overflow-y: auto;"></div>
            <hr style="border-color:#3d2461; margin:10px 0;">
            
            <h3>➕ Menyudan Seçib Əlavə Et:</h3>
            <div id="menuGrid" class="menu-grid"></div>
            
            <button onclick="closeTableBill()" style="background:#c0392b; margin-top:15px;">HESAB BAĞLA</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, update, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://aahh-631a5-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    let currentTableId = null; let localTables = {}; let dayTotalCash = 0;

    onValue(ref(database, 'lounge/tables'), (snapshot) => {
        const grid = document.getElementById('tablesGrid'); grid.innerHTML = "";
        if (snapshot.exists()) {
            localTables = snapshot.val();
            Object.keys(localTables).forEach(id => {
                const t = localTables[id]; const isBusy = t.status === "busy";
                grid.innerHTML += `<div class="table-card ${isBusy?'busy':'empty'}" onclick="selectTable('${id}')">${t.name}<br><span style="font-size:11px;">${isBusy?t.total+' AZN':'Boş'}</span></div>`;
            });
            if(currentTableId) selectTable(currentTableId);
        }
    });

    onValue(ref(database, 'lounge/staff'), (snapshot) => {
        const select = document.getElementById('staffSelect'); select.innerHTML = '<option value="">İşçi Seçin...</option>';
        if(snapshot.exists()) snapshot.forEach(c => { select.innerHTML += `<option value="${c.val().name}">${c.val().name}</option>`; });
    });

    // 100% ZƏMANƏTLİ, ADALARA GÖRƏ AVTOMATİK ŞƏKİL TANIMA SİSTEMİ
    onValue(ref(database, 'lounge/menu'), (snapshot) => {
        const grid = document.getElementById('menuGrid'); grid.innerHTML = "";
        if(snapshot.exists()) {
            snapshot.forEach(child => {
                const id = child.key; const m = child.val();
                
                let productImg = m.img;
                const nameUpper = m.name.toUpperCase();

                // Ada görə şəkil yoxlanışı
                if (nameUpper.includes("COCA COLA") || nameUpper.includes("COLA") || nameUpper.includes("KOLA")) {
                    productImg = "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?q=80&w=200&auto=format&fit=crop";
                } else if (nameUpper.includes("QƏLYAN") || nameUpper.includes("QELYAN") || nameUpper.includes("HOOKAH")) {
                    productImg = "https://images.unsplash.com/photo-1542332606-b2d1c6381e4f?q=80&w=200&auto=format&fit=crop";
                } else if (nameUpper.includes("ÇAY") || nameUpper.includes("CAY") || nameUpper.includes("TEA")) {
                    productImg = "https://images.unsplash.com/photo-1576092768241-dec231879fc3?q=80&w=200&auto=format&fit=crop";
                } else {
                    // Sistemdə olmayan fərqli bir məhsul daxil edilərsə standart kokteyl görünəcək
                    productImg = "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?q=80&w=200";
                }
                
                grid.innerHTML += `
                    <div class="menu-card" onclick="addOrder('${id}','${m.name}',${m.price})">
                        <div class="img-container">
                            <img src="${productImg}" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?q=80&w=200';">
                        </div>
                        <span>${m.name}</span>
                        <span style="color:#2ecc71;">${m.price} AZN</span>
                    </div>`;
            });
        }
    });

    window.staffLog = function(type) {
        const staff = document.getElementById('staffSelect').value;
        if(!staff) return alert("İşçi seçin!");
        push(ref(database, 'lounge/attendance'), { staff, type, time: new Date().toLocaleString() });
        alert(`${staff} üçün ${type} qeyd olundu!`);
    }

    window.selectTable = function(id) {
        currentTableId = id; const t = localTables[id];
        document.getElementById('selectedTableName').innerText = `[ ${t.name} ]`;
        document.getElementById('tableTotal').innerText = parseFloat(t.total || 0).toFixed(2);
        document.getElementById('orderSection').style.display = "block";
        const div = document.getElementById('currentOrders'); div.innerHTML = "";
        if(t.orders) {
            Object.values(t.orders).forEach(o => { div.innerHTML += `<div class="order-item"><span>${o.name} x${o.qty}</span><span>${(o.price*o.qty).toFixed(2)} AZN</span></div>`; });
        } else { div.innerHTML = "<p style='color:#555;text-align:center;'>Sifariş yoxdur.</p>"; }
    }

    window.addOrder = function(menuId, name, price) {
        if(!currentTableId) return alert("Masa seçin!");
        const t = localTables[currentTableId];
        let orders = t.orders ? {...t.orders} : {};
        if(orders[menuId]) { orders[menuId].qty += 1; } else { orders[menuId] = { name, price, qty: 1 }; }
        let total = 0; Object.values(orders).forEach(o => total += o.price * o.qty);
        update(ref(database, `lounge/tables/${currentTableId}`), { status:"busy", orders, total: parseFloat(total.toFixed(2)) });
    }

    window.closeTableBill = function() {
        const t = localTables[currentTableId]; if(!t || t.total == 0) return;
        if(confirm("Hesab bağlansın?")) {
            dayTotalCash += t.total;
            set(ref(database, `lounge/tables/${currentTableId}`), { name: t.name, status: "empty", total: 0, orders: null });
            document.getElementById('orderSection').style.display = "none"; currentTableId = null;
        }
    }

    window.finishDayWork = function() {
        if(confirm(`Günü tamamlamaq və kassaları müdirə göndərmək istəyirsiniz?\nBugünkü cəmi gəlir: ${dayTotalCash} AZN`)) {
            push(ref(database, 'lounge/reports'), { date: new Date().toLocaleString(), cash: dayTotalCash });
            alert("Hesabat müdir panelinə göndərildi!");
            dayTotalCash = 0;
        }
    }
</script>
</body>
</html>
