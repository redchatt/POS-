<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lounge - Müdir Paneli</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0b0612; color: #e0d5f0; padding: 20px; }
        h1, h2 { color: #bc95f9; text-shadow: 0 0 10px #bc95f9; margin-bottom: 20px; text-align: center; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .box { background: #130b21; border: 1px solid #3d2461; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        input, select, button { display: block; width: 100%; padding: 12px; margin: 10px 0; background: #1c1032; border: 1px solid #5c3893; color: #fff; border-radius: 5px; outline: none; }
        button { background: #6f3bbb; color: #fff; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { background: #8a4fff; box-shadow: 0 0 10px #8a4fff; }
        
        /* Canlı Masalar */
        .live-tables { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px; }
        .table-badge { padding: 12px 20px; border-radius: 5px; font-weight: bold; font-size: 14px; text-align: center; min-width: 100px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .empty { background: #1b4d22; border: 1px solid #2ecc71; color: #2ecc71; }
        .busy { background: #661c1c; border: 1px solid #e74c3c; color: #e74c3c; animation: pulse 2s infinite; }
        
        /* Siyahılar */
        .list-item { background: #1c122e; border: 1px solid #3d2461; padding: 10px; margin: 5px 0; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { background: #c0392b; width: auto; padding: 5px 10px; margin: 0; font-size: 12px; }
        .del-btn:hover { background: #e74c3c; box-shadow: 0 0 5px #e74c3c; }

        @keyframes pulse { 0% { opacity: 0.9; } 50% { opacity: 1; box-shadow: 0 0 10px #e74c3c; } 100% { opacity: 0.9; } }
    </style>
</head>
<body>

    <h1>🔮 LOUNGE MANAGEMENT SYSTEM (MÜDİR)</h1>
    
    <!-- CANLI İZLEME PANELİ -->
    <div class="box">
        <h2>📊 Masaların Canlı Vəziyyəti</h2>
        <div id="liveTablesContainer" class="live-tables">Yüklənir...</div>
    </div>

    <div class="grid-container">
        <!-- MASA ƏLAVƏ ET / SİL -->
        <div class="box">
            <h2>🪑 Masa İdarəetməsi</h2>
            <input type="text" id="newTableName" placeholder="Masa Adı (Məs: Masa 5, VIP 1)">
            <button onclick="addTable()">YENİ MASA ƏLAVƏ ET</button>
            <div id="tablesList" style="margin-top: 15px;"></div>
        </div>

        <!-- MENYU İDARƏETMƏSİ -->
        <div class="box">
            <h2>🍔 Menyu İdarəetməsi</h2>
            <input type="text" id="itemName" placeholder="Məhsul Adı (Məs: Klassik Qəlyan)">
            <input type="number" id="itemPrice" placeholder="Qiyməti (Məs: 15)" step="0.1">
            <button onclick="addMenuItem()">MENYUYA ƏLAVƏ ET</button>
            <div id="menuList" style="margin-top: 15px;"></div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, remove, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Sənin mövcud Firebase Baza ünvanın
    const firebaseConfig = { databaseURL: "https://aahh-631a5-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // 1. CANLI MASALARI VƏ MASA SİYAHISINI İZNLƏMƏK
    onValue(ref(database, 'lounge/tables'), (snapshot) => {
        const liveContainer = document.getElementById('liveTablesContainer');
        const listContainer = document.getElementById('tablesList');
        liveContainer.innerHTML = "";
        listContainer.innerHTML = "";

        if (snapshot.exists()) {
            snapshot.forEach((child) => {
                const id = child.key;
                const data = child.val();
                
                // Canlı vəziyyət qutuları
                const isBusy = data.status === "busy";
                const statusClass = isBusy ? "busy" : "empty";
                const infoText = isBusy ? `${data.name}<br>${data.total} AZN` : `${data.name}<br>Boş`;
                
                liveContainer.innerHTML += `<div class="table-badge ${statusClass}">${infoText}</div>`;
                
                // Silmək üçün siyahı
                listContainer.innerHTML += `
                    <div class="list-item">
                        <span>${data.name}</span>
                        <button class="del-btn" onclick="deleteTable('${id}')">SİL</button>
                    </div>`;
            });
        } else {
            liveContainer.innerHTML = "<p>Heç bir masa yaradılmayıb.</p>";
        }
    });

    // 2. MENYUNU İZNLƏMƏK
    onValue(ref(database, 'lounge/menu'), (snapshot) => {
        const menuContainer = document.getElementById('menuList');
        menuContainer.innerHTML = "";
        if (snapshot.exists()) {
            snapshot.forEach((child) => {
                const id = child.key;
                const data = child.val();
                menuContainer.innerHTML += `
                    <div class="list-item">
                        <span>${data.name} - <b>${data.price} AZN</b></span>
                        <button class="del-btn" onclick="deleteMenuItem('${id}')">SİL</button>
                    </div>`;
            });
        } else {
            menuContainer.innerHTML = "<p>Menyu boşdur.</p>";
        }
    });

    // 3. YENİ MASA ƏLAVƏ ETMƏK
    window.addTable = function() {
        const name = document.getElementById('newTableName').value.trim();
        if (!name) return alert("Masa adı yazın!");
        const id = 'table_' + Date.now();
        
        set(ref(database, 'lounge/tables/' + id), {
            name: name,
            status: "empty",
            total: 0
        }).then(() => {
            document.getElementById('newTableName').value = "";
        });
    }

    // 4. MASA SİLMƏK
    window.deleteTable = function(id) {
        if(confirm("Bu masanı sistemdən silmək istəyirsiniz?")) {
            remove(ref(database, 'lounge/tables/' + id));
        }
    }

    // 5. MENYUYA MƏHSUL ƏLAVƏ ETMƏK
    window.addMenuItem = function() {
        const name = document.getElementById('itemName').value.trim();
        const price = parseFloat(document.getElementById('itemPrice').value);
        if (!name || isNaN(price)) return alert("Məhsul adını və qiymətini düzgün daxil edin!");
        const id = 'item_' + Date.now();

        set(ref(database, 'lounge/menu/' + id), {
            name: name,
            price: price
        }).then(() => {
            document.getElementById('itemName').value = "";
            document.getElementById('itemPrice').value = "";
        });
    }

    // 6. MENYUDAN MƏHSUL SİLMƏK
    window.deleteMenuItem = function(id) {
        if(confirm("Bu məhsulu menyudan silmək istəyirsiniz?")) {
            remove(ref(database, 'lounge/menu/' + id));
        }
    }
</script>
</body>
</html>
